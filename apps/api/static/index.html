<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procura — Agentic Procurement OS</title>
    <style>
      :root {
        --bg: #0b1120;
        --surface: #131c31;
        --surface-2: #1b2742;
        --border: #243352;
        --text: #e6edf6;
        --muted: #8da2c0;
        --brand: #6ea8fe;
        --brand-2: #8b7dff;
        --good: #34d399;
        --warn: #fbbf24;
        --bad: #f87171;
        --shadow: 0 18px 40px -18px rgba(0, 0, 0, 0.65);
        font-synthesis: none;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 80% -10%, rgba(110, 168, 254, 0.18), transparent 60%),
          radial-gradient(900px 500px at -10% 10%, rgba(139, 125, 255, 0.16), transparent 55%),
          var(--bg);
        min-height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 32px;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(6px);
        position: sticky;
        top: 0;
        z-index: 5;
        background: rgba(11, 17, 32, 0.7);
      }
      .brand { display: flex; align-items: center; gap: 12px; }
      .logo {
        width: 38px; height: 38px; border-radius: 11px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        display: grid; place-items: center; font-weight: 800; color: #0b1120;
        box-shadow: var(--shadow);
      }
      .brand h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; }
      .brand p { margin: 0; font-size: 12px; color: var(--muted); }
      .pill {
        font-size: 12px; color: var(--muted); border: 1px solid var(--border);
        padding: 6px 12px; border-radius: 999px; display: inline-flex; gap: 8px; align-items: center;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bad); }
      .dot.online { background: var(--good); box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.18); }
      main {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 24px;
        padding: 24px 32px 48px;
        max-width: 1320px;
        margin: 0 auto;
      }
      @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
      .card {
        background: linear-gradient(180deg, var(--surface), var(--surface-2));
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }
      .card h2 { margin: 0; font-size: 14px; padding: 16px 18px; border-bottom: 1px solid var(--border); letter-spacing: 0.3px; }
      .card .body { padding: 18px; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 6px; }
      input, select, textarea {
        width: 100%; padding: 10px 12px; border-radius: 10px;
        border: 1px solid var(--border); background: #0e1626; color: var(--text);
        font-size: 14px; font-family: inherit; outline: none;
      }
      input:focus, select:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(110, 168, 254, 0.18); }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .field { margin-bottom: 14px; }
      button {
        cursor: pointer; border: none; border-radius: 10px; font-weight: 600; font-size: 14px;
        padding: 11px 14px; color: #0b1120;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        transition: transform 0.05s ease, opacity 0.2s ease;
      }
      button:hover { opacity: 0.94; }
      button:active { transform: translateY(1px); }
      button.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
      button.good { background: linear-gradient(135deg, #34d399, #10b981); }
      button.bad { background: linear-gradient(135deg, #fb7185, #f43f5e); color: #fff; }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      .orders { display: flex; flex-direction: column; gap: 10px; max-height: 60vh; overflow-y: auto; }
      .order-item {
        border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer;
        background: #0e1626; transition: border-color 0.15s ease, transform 0.05s ease;
      }
      .order-item:hover { border-color: var(--brand); }
      .order-item.active { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(110, 168, 254, 0.25); }
      .order-item .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .order-item .mat { font-weight: 600; font-size: 14px; text-transform: capitalize; }
      .order-item .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
      .badge {
        font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap;
        border: 1px solid transparent;
      }
      .badge.running { color: var(--brand); background: rgba(110, 168, 254, 0.12); }
      .badge.awaiting_human { color: var(--warn); background: rgba(251, 191, 36, 0.12); }
      .badge.completed { color: var(--good); background: rgba(52, 211, 153, 0.12); }
      .badge.cancelled, .badge.failed { color: var(--bad); background: rgba(248, 113, 113, 0.12); }
      .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 28px 8px; }
      .stages { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
      .stage {
        flex: 1 1 120px; border: 1px solid var(--border); border-radius: 12px; padding: 12px;
        background: #0e1626;
      }
      .stage .n { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
      .stage .v { font-size: 15px; font-weight: 600; margin-top: 6px; }
      .stage.done { border-color: rgba(52, 211, 153, 0.4); }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
      tr.winner td { background: rgba(52, 211, 153, 0.08); }
      .win-tag { font-size: 10px; color: var(--good); border: 1px solid rgba(52, 211, 153, 0.4); border-radius: 999px; padding: 1px 7px; margin-left: 8px; }
      .approval-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-top: 18px; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: #0e1626; }
      .approval-actions { display: flex; gap: 10px; }
      .muted { color: var(--muted); font-size: 13px; }
      .detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
      .detail-head h3 { margin: 0 0 4px; font-size: 18px; text-transform: capitalize; }
      .timeline { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
      .timeline .ev { display: flex; gap: 10px; font-size: 13px; padding: 5px 0; color: var(--muted); }
      .timeline .ev b { color: var(--text); }
      .placeholder { display: grid; place-items: center; min-height: 320px; text-align: center; color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="logo">P</div>
        <div>
          <h1>Procura</h1>
          <p>Agentic Procurement OS · AridOS-inspired demo</p>
        </div>
      </div>
      <span class="pill"><span id="status-dot" class="dot"></span><span id="status-text">connecting…</span></span>
    </header>

    <main>
      <section class="left">
        <div class="card" style="margin-bottom: 24px">
          <h2>New procurement request</h2>
          <div class="body">
            <div class="field">
              <label for="raw">Describe what you need</label>
              <textarea id="raw" rows="2">Need 500 tons of rebar steel for the Riyadh tower foundation by next month.</textarea>
            </div>
            <div class="row">
              <div class="field">
                <label for="material">Material</label>
                <select id="material">
                  <option value="rebar_steel">Rebar Steel</option>
                  <option value="cement_bag">Cement Bag</option>
                  <option value="ready_mix_concrete">Ready-Mix Concrete</option>
                  <option value="ceramic_tile">Ceramic Tile</option>
                </select>
              </div>
              <div class="field">
                <label for="region">Region</label>
                <select id="region">
                  <option value="riyadh">Riyadh</option>
                  <option value="jeddah">Jeddah</option>
                  <option value="dammam">Dammam</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label for="quantity">Quantity (tons)</label>
              <input id="quantity" type="number" min="1" value="500" />
            </div>
            <button id="submit" style="width: 100%">Run procurement pipeline</button>
          </div>
        </div>

        <div class="card">
          <h2>Active orders</h2>
          <div class="body">
            <div id="orders" class="orders"><div class="empty">No orders yet.</div></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Order detail</h2>
        <div class="body" id="detail">
          <div class="placeholder">
            <div>
              <p style="font-size: 15px; margin: 0 0 6px; color: var(--text)">Select or create an order</p>
              <p class="muted" style="max-width: 320px">Run the five-stage pipeline — intake, sourcing, decision, approval gate, and fulfilment — to see live results.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const money = (n) => n == null ? "—" : new Intl.NumberFormat("en-US", { style: "currency", currency: "SAR", maximumFractionDigits: 0 }).format(n);
      const cap = (s) => (s || "").replace(/_/g, " ");
      let activeId = null;

      async function api(path, options) {
        const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...options });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || res.statusText);
        return res.json();
      }

      async function checkHealth() {
        try {
          await api("/health/live");
          $("status-dot").classList.add("online");
          $("status-text").textContent = "API online";
        } catch {
          $("status-text").textContent = "API offline";
        }
      }

      function badge(status) {
        return `<span class="badge ${status}">${cap(status)}</span>`;
      }

      async function loadOrders() {
        const orders = await api("/orders");
        const box = $("orders");
        if (!orders.length) { box.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
        box.innerHTML = orders.map((o) => `
          <div class="order-item ${o.order_id === activeId ? "active" : ""}" data-id="${o.order_id}">
            <div class="top">
              <span class="mat">${cap(o.material_code)}</span>
              ${badge(o.status)}
            </div>
            <div class="sub">${o.quantity} t · ${cap(o.region)} · ${money(o.recommended_total)}</div>
          </div>`).join("");
        box.querySelectorAll(".order-item").forEach((el) =>
          el.addEventListener("click", () => showOrder(el.dataset.id)));
      }

      function stageCard(n, name, value, done) {
        return `<div class="stage ${done ? "done" : ""}"><div class="n">${n} · ${name}</div><div class="v">${value}</div></div>`;
      }

      async function showOrder(id) {
        activeId = id;
        const o = await api(`/orders/${id}`);
        const quotes = [...o.bidding.quotes_received].sort((a, b) => a.total - b.total);
        const winner = o.bidding.recommended_bid?.supplier_id;
        const awaiting = o.approval.status === "pending" && o.pipeline_control.status === "awaiting_human";

        const rows = quotes.map((q) => `
          <tr class="${q.supplier_id === winner ? "winner" : ""}">
            <td>${cap(q.supplier_id)}${q.supplier_id === winner ? '<span class="win-tag">recommended</span>' : ""}</td>
            <td>${money(q.unit_price)}</td>
            <td>${money(q.total)}</td>
            <td>${q.lead_time_days} d</td>
            <td>${Math.round(q.reliability_score * 100)}%</td>
          </tr>`).join("");

        const events = [...o.audit_log].reverse().map((e) =>
          `<div class="ev"><b>${cap(e.agent)}</b> — ${e.action}</div>`).join("");

        $("detail").innerHTML = `
          <div class="detail-head">
            <div>
              <h3>${cap(o.request.material_code)} · ${o.request.quantity} t</h3>
              <div class="muted">${cap(o.request.region)} · order ${o.identity.order_id.slice(0, 8)}</div>
            </div>
            ${badge(o.pipeline_control.status)}
          </div>

          <div class="stages">
            ${stageCard(1, "Intake", `${Math.round((o.intake.feasibility_score || 0) * 100)}% feasible`, true)}
            ${stageCard(2, "Sourcing", `${o.sourcing.candidate_supplier_ids.length} suppliers`, true)}
            ${stageCard(3, "Decision", money(o.bidding.recommended_bid?.total), true)}
            ${stageCard(4, "Approval", cap(o.approval.required_level), o.approval.status !== "pending")}
            ${stageCard(5, "Budget left", money(o.intake.budget_remaining), true)}
          </div>

          <table>
            <thead><tr><th>Supplier</th><th>Unit</th><th>Total</th><th>Lead</th><th>Reliability</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>

          <div class="approval-bar">
            <div>
              <div style="font-weight:600">Approval gate · ${cap(o.approval.required_level)}</div>
              <div class="muted">${o.approval.decision_reason || "Awaiting human decision"}</div>
            </div>
            <div class="approval-actions">
              <button class="good" id="approve" ${awaiting ? "" : "disabled"}>Approve</button>
              <button class="bad" id="reject" ${awaiting ? "" : "disabled"}>Reject</button>
            </div>
          </div>

          <div class="timeline">${events}</div>`;

        if (awaiting) {
          $("approve").addEventListener("click", () => decide(id, "approve"));
          $("reject").addEventListener("click", () => decide(id, "reject"));
        }
      }

      async function decide(id, action) {
        await api(`/approvals/${id}/${action}`, { method: "POST" });
        await loadOrders();
        await showOrder(id);
      }

      $("submit").addEventListener("click", async () => {
        const btn = $("submit");
        btn.disabled = true;
        btn.textContent = "Running pipeline…";
        try {
          const order = await api("/orders", {
            method: "POST",
            body: JSON.stringify({
              raw_input: $("raw").value,
              material_code: $("material").value,
              quantity: Number($("quantity").value),
              region: $("region").value,
            }),
          });
          await loadOrders();
          await showOrder(order.identity.order_id);
        } catch (e) {
          alert("Failed: " + e.message);
        } finally {
          btn.disabled = false;
          btn.textContent = "Run procurement pipeline";
        }
      });

      checkHealth();
      loadOrders();
    </script>
  </body>
</html>
